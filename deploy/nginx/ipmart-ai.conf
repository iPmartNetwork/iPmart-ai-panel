map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

limit_req_zone $binary_remote_addr zone=ipmart_general:10m rate=15r/s;

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    access_log /var/log/nginx/ipmart-ai.access.log;
    error_log  /var/log/nginx/ipmart-ai.error.log warn;

    client_max_body_size 100M;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /branding/ {
        alias ${INSTALL_DIR}/public/branding/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location /icons/ {
        alias ${INSTALL_DIR}/public/icons/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location = /favicon.ico {
        alias ${INSTALL_DIR}/public/favicon.ico;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location = /manifest.webmanifest {
        alias ${INSTALL_DIR}/public/manifest.webmanifest;
        default_type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sw.js {
        alias ${INSTALL_DIR}/public/sw.js;
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location = /ipmart-theme.css {
        alias ${INSTALL_DIR}/theme/ipmart-theme.css;
        default_type text/css;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /ipmart-theme.js {
        alias ${INSTALL_DIR}/theme/ipmart-theme.js;
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location / {
        limit_req zone=ipmart_general burst=40 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Required for sub_filter to work reliably on HTML responses
        proxy_set_header Accept-Encoding "";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_connect_timeout 60;

        proxy_buffering off;
        proxy_request_buffering off;

        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '</head>' '<link rel="manifest" href="/manifest.webmanifest"><link rel="icon" href="/favicon.ico"><link rel="apple-touch-icon" href="/icons/apple-touch-icon.png"><meta name="theme-color" content="#19C37D"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="iPmart AI"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="stylesheet" href="/ipmart-theme.css"><script defer src="/ipmart-theme.js"></script></head>';

        add_header Cache-Control "no-store";
    }

    location ~* ^/(api|oauth|callback|login|ws|websocket) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Accept-Encoding "";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_connect_timeout 60;

        proxy_buffering off;
        proxy_request_buffering off;

        add_header Cache-Control "no-store";
    }
}
